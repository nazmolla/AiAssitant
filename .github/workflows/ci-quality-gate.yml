name: CI Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit/Integration/Component Tests
        run: npx jest --forceExit

      - name: Vulnerability Audit (moderate+)
        run: npm audit --audit-level=moderate
