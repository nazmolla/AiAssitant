; PlatformIO project for M5Stack Atom Echo ↔ Nexus Agent
;
; Flash: pio run -t upload
; Monitor: pio device monitor
; Both: pio run -t upload && pio device monitor

[env:atom-echo]
platform = espressif32@^6.5.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

; Use huge_app partition (3 MB app, 1 MB SPIFFS) — we need room for
; WiFi + TLS + audio buffers.  No OTA partition.
board_build.partitions = huge_app.csv

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    ; Add your micro-wake-up Arduino library here (or in lib/)
    ; Example (replace with actual package/repo you use):
    ; your-org/micro-wake-up@^x.y.z

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    ; Stack size for the main Arduino loop task (default 8192 is tight
    ; when doing TLS + HTTP)
    -DARDUINO_LOOP_STACK_SIZE=16384
